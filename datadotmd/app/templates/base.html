<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{{ root_path }}/static/favicon.ico">
    <link rel="apple-touch-icon" href="{{ root_path }}/static/apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <a href="{{ root_path }}/" class="text-xl font-bold text-blue-600">{{ app_name }}</a>
                    </div>
                    <div class="ml-6 flex space-x-8">
                        <a href="{{ root_path }}/" class="inline-flex items-center px-1 pt-1 border-b-2 {% if request.url.path == root_path + '/' or request.url.path == root_path %}border-blue-500 text-gray-900{% else %}border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700{% endif %} text-sm font-medium">
                            Home
                        </a>
                        <a href="{{ root_path }}/browse/" class="inline-flex items-center px-1 pt-1 border-b-2 {% if root_path + '/browse' in request.url.path or '/browse' in request.url.path %}border-blue-500 text-gray-900{% else %}border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700{% endif %} text-sm font-medium">
                            Browse
                        </a>
                    </div>
                </div>
                {% if auth_url %}
                    <div class="flex items-center">
                        {% if not request.user.is_authenticated %}
                        <button class="bg-blue-600 hover:bg-blue-700 px-3 py-2 rounded-md">
                            <a href="{{ auth_url }}" class="text-white">Login <img class="inline-flex items-center" src="{{ root_path }}/static/so_pixel.png"></a>
                        </button>
                        {% else %}
                        <button class="text-white-600 bg-red-600 hover:bg-red-700 px-3 py-2 rounded-md">
                            <a href="{{ root_path }}/logout" class="text-white">Logout</a>
                        </button>
                        {% endif %}
                    </div>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t border-gray-200 mt-12">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
            <p class="text-center text-sm text-gray-500">
                {{ app_name }}
            </p>
        </div>
    </footer>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
